on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
jobs:
  org-checks:
    uses: aspect-extensions/.github/.github/workflows/org-check.yaml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bazel-contrib/setup-bazel@0.15.0
      - name: Install Aspect CLI
        env:
          GH_TOKEN: ${{ github.token }}
          ASPECT_CLI_VERSION: v2026.28.13
        run: |
          gh release download "$ASPECT_CLI_VERSION" \
            --repo aspect-build/aspect-cli \
            --pattern aspect-cli-x86_64-unknown-linux-musl \
            --output "$RUNNER_TEMP/aspect"
          chmod +x "$RUNNER_TEMP/aspect"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Test
        working-directory: example
        shell: sh
        run: $GITHUB_WORKSPACE/example/README.md || exit 1
